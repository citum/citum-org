<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} | News | Citum</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../theme.css">
</head>
<body class="min-h-screen">

  <header class="glass-nav sticky top-0 z-10">
    <div class="mx-auto max-w-[1100px] px-5 flex items-center justify-between gap-3 flex-wrap py-2 min-h-[64px]">
      <a href="https://citum.org" class="flex items-center gap-2 no-underline group">
          <div class="w-8 h-8 rounded flex items-center justify-center shrink-0" style="background:#2a94d6">
            <span class="text-white font-bold text-sm" style="font-family:'JetBrains Mono',monospace">C</span>
          </div>
          <span class="font-bold text-gray-900" style="font-family:'JetBrains Mono',monospace;font-size:1.05rem;letter-spacing:-0.01em">Citum</span>
        </a>
      <nav class="flex gap-1 flex-wrap justify-end" aria-label="Global">
        <a class="nav-link" href="https://citum.org">Home</a>
        <a class="nav-link active" href="index.html" aria-current="page">News</a>
        <a class="nav-link" href="https://docs.citum.org">Docs</a>
        <a class="nav-link" href="https://hub.citum.org">Hub</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-[800px] px-5 py-14 pb-20">
    <article>
        <header class="mb-10">
            <div class="kicker mb-3">{{DATE}}</div>
            <h1 class="font-bold leading-tight tracking-tight text-gray-900 text-4xl md:text-5xl mb-4">{{TITLE}}</h1>
            <p class="text-xl text-gray-500 leading-relaxed italic">{{SUMMARY}}</p>
        </header>

        <div class="prose prose-slate prose-blue max-w-none prose-headings:font-bold prose-headings:tracking-tight prose-p:leading-relaxed prose-a:text-blue-600 prose-a:no-underline hover:prose-a:underline">
            {{CONTENT}}
        </div>
        
        <div class="mt-16 pt-8 border-t border-gray-100">
            <a href="index.html" class="btn-secondary">← Back to News</a>
        </div>
    </article>

    <footer class="mt-20 pt-8 border-t border-gray-100 text-[0.85rem] text-gray-400">
      Citum &middot; <a href="https://docs.citum.org" class="text-gray-500 hover:text-gray-800 no-underline">Docs</a> &middot; <a href="https://github.com/citum" class="text-gray-500 hover:text-gray-800 no-underline">GitHub</a>
    </footer>
  </main>
</body>
</html>
